run:
  run_id: network_w2_shock_sigma2_radc
  seed: 12345
  output_dir: results/network_w2_shock_sigma2_radc
  epochs: 12
  warmup_epochs: 2
  overwrite: true
mpi:
  comm: WORLD
  barrier_before_epochs: true
  barrier_after_epochs: true
buffer:
  N: 8192
  S: 8192
  layout: row_major
  dtype_in: float32
radc:
  enabled: true
  intercept: MPI_Allreduce
  only_if_op: MPI_SUM
  r_min: 2
  r_max: 64
  oversample_p: 8
  power_iters: 1
  omega_dist: rademacher
  omega_seed: 424242
  energy_capture: 0.999
  factor_dtype: float32
sketch:
  kind: countsketch2d
  kG: 128
  kS: 128
  num_sketches: 2
  hash_seed_g0: 777
  sign_seed_g0: 123
  hash_seed_s0: 999
  sign_seed_s0: 456
  hash_seed_g1: 1777
  sign_seed_g1: 1123
  hash_seed_s1: 1999
  sign_seed_s1: 1456
risk:
  kind: cva_like_scoped
  netting_sets_G: 64
  netting_seed: 202
  collateral_kind: threshold
  collateral_threshold: 0.0
  a_scalar: 1.0
  scenario_weights: uniform
  notional_total: 0.0
safety:
  xva_epsilon_bps: 0.01
  accept_margin: 0.9
  jl_epsilon: 0.1
  jl_delta: 1.0e-12
detect:
  enabled: true
  delta_m_sigma_threshold: 6.0
  force_fallback_if_r_hits_rmax: false
fallback:
  enabled: true
  mode: collective_flag
profiling:
  timing_breakdown: true
  perf_stat_enable: false
  perf_events:
  - cycles
  - instructions
  - cache-misses
  - LLC-load-misses
  rapl_enable: false
  net_emulation_bandwidth_gbps: 1.0
  net_emulation_base_latency_ms: 0.0
logging:
  per_rank_csv: metrics_rank{rank}.csv
  per_rank_jsonl: events_rank{rank}.jsonl
  flush_every_epochs: 1
  shadow_exact_every: 2
workload:
  kind: delta_gamma
  common_scenarios_across_ranks: true
  common_delta_m_across_ranks: true
  delta_gamma:
    d_factors: 4
    notional_min: 1.0e5
    notional_max: 5.0e5
    delta_scale: 0.005
    gamma_scale: 0.001
    scenario_sigma: 1.0
    shock_sigma: 2.0
    nonlinear_lambda: 0.0
compression:
  double_mode: native64
